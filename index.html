<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Battle Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        #game-container {
            width: 640px;
            height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* --- GAME OVER SCREEN --- */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: black;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #game-over-title {
            font-size: 72px;
            margin-bottom: 10px;
        }

        #game-over-subtitle {
            font-size: 24px;
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        #btn-ok {
            background: transparent;
            color: white;
            border: 2px solid white;
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 10px 30px;
            cursor: pointer;
        }

        #btn-ok:hover {
            background: white;
            color: black;
        }

        /* --- BATTLE UI --- */
        #monster-area {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        #monster-area img {
            max-height: 100%;
            image-rendering: pixelated;
        }

        #dialogue-box {
            width: 560px;
            height: 140px;
            border: 4px solid white;
            padding: 15px;
            box-sizing: border-box;
            font-size: 28px;
            line-height: 1.2;
            position: relative;
            overflow: hidden; 
        }

        .submenu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            row-gap: 15px;
            margin-left: 20px;
        }

        .menu-item { position: relative; }

        .heart {
            color: red;
            position: absolute;
            left: -25px;
            top: 2px;
            font-size: 24px;
        }

        #stats-bar {
            width: 560px;
            display: flex;
            align-items: center;
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }

        .stat-label { margin-right: 25px; }
        .hp-label { margin-right: 15px; }

        .hp-bar-bg {
            width: 80px;
            height: 20px;
            background-color: red;
            margin-right: 15px;
        }

        .hp-bar-fill {
            width: 100%;
            height: 100%;
            background-color: yellow;
            transition: width 0.2s;
        }

        #buttons-container {
            width: 560px;
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .action-button {
            border: 2px solid #ff9900;
            color: #ff9900;
            padding: 5px 15px;
            font-size: 24px;
            display: flex;
            align-items: center;
        }

        .action-button.unselected { border-color: #ff9900; color: #ff9900; }
        .action-button.selected { background-color: #ff9900; color: black; }
        .action-button .btn-icon { margin-right: 8px; font-size: 20px; }

        #player-soul {
            position: absolute;
            font-size: 24px;
            display: none;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
        }

        .dog-projectile {
            position: absolute;
            width: 30px;  /* Reverted to 30px */
            height: 30px; /* Reverted to 30px */
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<div id="game-over-screen">
    <div id="game-over-title">Game Over</div>
    <div id="game-over-subtitle">by the annoying dog</div>
    <button id="btn-ok" onclick="location.reload()">OK</button>
</div>

<div id="game-container">
    <div id="monster-area">
        <img src="Challenger.png" alt="Challenger">
    </div>

    <div id="dialogue-box">
        <div id="dialogue-content"></div>
        <div id="player-soul">♥</div>
    </div>

    <div id="stats-bar">
        <span class="stat-label">Frisk</span>
        <span class="stat-label">LV 19</span>
        <span class="hp-label">HP</span>
        <div class="hp-bar-bg"><div id="hp-fill" class="hp-bar-fill"></div></div>
        <span id="hp-text">92 / 92</span>
    </div>

    <div id="buttons-container">
        <div class="action-button" id="btn-fight"><span class="btn-icon">♥</span> FIGHT</div>
        <div class="action-button" id="btn-act"><span class="btn-icon">♥</span> ACT</div>
        <div class="action-button" id="btn-item"><span class="btn-icon">♥</span> ITEM</div>
        <div class="action-button" id="btn-mercy"><span class="btn-icon">♥</span> MERCY</div>
    </div>
</div>

<script>
    // --- GAME DATA ---
    const actOptions = ["Hi", "Talk"];
    const itemOptions = ["Spaghetti", "Spaghetti", "Pizza", "Mac & Cheese", "Mac & Cheese", "Snow Cone"];
    
    let state = 'MAIN'; 
    let mainIndex = 0; 
    let subIndex = 0;  
    let currentMessage = "* Fight dialogue";
    
    let maxHp = 92;
    let currentHp = 92;
    let currentWave = 0; // NEW: Tracks which attack pattern to use

    const dialogueContent = document.getElementById('dialogue-content');
    const playerSoul = document.getElementById('player-soul');
    const dialogueBox = document.getElementById('dialogue-box');
    const hpFill = document.getElementById('hp-fill');
    const hpText = document.getElementById('hp-text');
    const gameContainer = document.getElementById('game-container');
    const gameOverScreen = document.getElementById('game-over-screen');
    const buttons = [
        document.getElementById('btn-fight'),
        document.getElementById('btn-act'),
        document.getElementById('btn-item'),
        document.getElementById('btn-mercy')
    ];

    function render() {
        hpText.innerText = `${currentHp} / ${maxHp}`;
        hpFill.style.width = `${(currentHp / maxHp) * 100}%`;

        buttons.forEach((btn, i) => {
            if (state === 'MAIN' && mainIndex === i) {
                btn.className = 'action-button selected';
                btn.querySelector('.btn-icon').style.visibility = 'visible';
            } else {
                btn.className = 'action-button unselected';
                btn.querySelector('.btn-icon').style.visibility = 'hidden';
            }
        });

        if (state === 'MAIN' || state === 'MSG') {
            dialogueContent.style.display = 'block';
            dialogueContent.innerHTML = currentMessage;
        } else if (state === 'ACT' || state === 'ITEM') {
            dialogueContent.style.display = 'block';
            const options = state === 'ACT' ? actOptions : itemOptions;
            
            let page = Math.floor(subIndex / 4);
            let startIndex = page * 4;
            let endIndex = Math.min(startIndex + 4, options.length);

            let html = '<div class="submenu-grid">';
            for (let i = startIndex; i < endIndex; i++) {
                const heart = (i === subIndex) ? '<span class="heart">♥</span>' : '';
                html += `<div class="menu-item">* ${heart}${options[i]}</div>`;
            }
            html += '</div>';
            
            if (options.length > 4) {
                html += `<div style="position:absolute; right:10px; bottom:10px; font-size:16px;">Page ${page+1}/${Math.ceil(options.length/4)}</div>`;
            }

            dialogueContent.innerHTML = html;
        } else if (state === 'ATTACK') {
            dialogueContent.style.display = 'none';
        }
    }

    function triggerGameOver() {
        state = 'GAME_OVER';
        clearTimeout(attackTimer);
        cancelAnimationFrame(attackLoopId);
        
        gameContainer.style.display = 'none';
        gameOverScreen.style.display = 'flex';
    }

    // --- ATTACK MINIGAME ENGINE ---
    let attackTimer;
    let attackLoopId;
    
    let player = { 
        x: 270, 
        y: 110, 
        speed: 5.5,          
        vy: 0, 
        gravity: 0.45,       
        jumpPower: -7.5,     
        invulnFrames: 0 
    };
    
    let dogs = [];
    const keysHeld = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

    window.addEventListener('keydown', (e) => { if(keysHeld.hasOwnProperty(e.key)) keysHeld[e.key] = true; });
    window.addEventListener('keyup', (e) => { if(keysHeld.hasOwnProperty(e.key)) keysHeld[e.key] = false; });

    // NEW: Helper function to spawn dogs at specific coordinates
    function spawnDog(startX, velocityX) {
        let img = document.createElement('img');
        img.src = 'Challenger.png'; 
        img.className = 'dog-projectile';
        dialogueBox.appendChild(img);
        
        dogs.push({
            element: img,
            x: startX,
            y: 140 - 30, // Locked to floor, adjusted for 30px height
            vx: velocityX, 
            width: 30, height: 30 
        });
    }

    function startAttack() {
        state = 'ATTACK';
        render();
        
        player.x = 270; 
        player.y = 110; 
        player.vy = 0;
        playerSoul.style.display = 'block';
        playerSoul.style.color = '#0033cc';

        dogs = [];
        
        // --- THE WAVE SYSTEM ---
        if (currentWave === 0) {
            // Wave 0: The Steady March (All from the right, spaced out)
            spawnDog(600, -4);
            spawnDog(750, -4);
            spawnDog(900, -4);
            spawnDog(1050, -4);
            spawnDog(1200, -4);
        } 
        else if (currentWave === 1) {
            // Wave 1: The Pincer (Coming from both sides simultaneously)
            spawnDog(600, -3.5);
            spawnDog(-100, 3.5);
            spawnDog(850, -3.5);
            spawnDog(-350, 3.5);
            spawnDog(1100, -3.5);
        } 
        else {
            // Wave 2+: The Fast Lane (Mix of fast and slow)
            spawnDog(600, -6);
            spawnDog(-200, 4);
            spawnDog(800, -6);
            spawnDog(1000, -3); // A slow one to mess up your timing
            spawnDog(-600, 5);
        }

        currentWave++; // Increment wave for the next turn
        
        attackTimer = setTimeout(endAttack, 15000); // Shortened to 15s to keep it punchy
        requestAnimationFrame(updateAttack);
    }

    function updateAttack() {
        if (state !== 'ATTACK') return; 

        // 1. Horizontal Movement
        if (keysHeld.ArrowLeft) player.x -= player.speed;
        if (keysHeld.ArrowRight) player.x += player.speed;
        player.x = Math.max(0, Math.min(player.x, 560 - 20));

        // 2. Vertical Movement & Variable Jump
        player.vy += player.gravity; 
        
        if (!keysHeld.ArrowUp && player.vy < 0) {
            player.vy *= 0.6; 
        }

        player.y += player.vy;       

        const floorY = 140 - 25; 
        let isGrounded = false;

        if (player.y >= floorY) {
            player.y = floorY; 
            player.vy = 0;     
            isGrounded = true;
        }

        if (keysHeld.ArrowUp && isGrounded) {
            player.vy = player.jumpPower; 
        }

        // Blinking
        if (player.invulnFrames > 0) {
            player.invulnFrames--;
            playerSoul.style.opacity = (player.invulnFrames % 10 < 5) ? 0.3 : 1;
        } else {
            playerSoul.style.opacity = 1;
        }

        playerSoul.style.left = player.x + 'px';
        playerSoul.style.top = player.y + 'px';

        // 3. Move Dogs & Check Hit
        dogs.forEach(dog => {
            dog.x += dog.vx;

            // When a dog goes off-screen, loop it way to the back to keep the rhythm going
            if (dog.vx < 0 && dog.x < -100) {
                dog.x = 900; 
            } else if (dog.vx > 0 && dog.x > 700) {
                dog.x = -200;
            }

            dog.element.style.left = dog.x + 'px';
            dog.element.style.top = dog.y + 'px';

            if (player.invulnFrames === 0) {
                let hitboxBuffer = 3; // Reduced buffer because dogs are smaller again
                
                if (player.x < dog.x + dog.width - hitboxBuffer &&
                    player.x + 20 > dog.x + hitboxBuffer &&
                    player.y < dog.y + dog.height - hitboxBuffer &&
                    player.y + 20 > dog.y + hitboxBuffer) {
                    
                    currentHp = Math.max(0, currentHp - 7);
                    player.invulnFrames = 60; 
                    render(); 

                    if (currentHp <= 0) {
                        triggerGameOver();
                    }
                }
            }
        });

        if (state === 'ATTACK') {
            attackLoopId = requestAnimationFrame(updateAttack);
        }
    }

    function endAttack() {
        if (state === 'GAME_OVER') return; 

        clearTimeout(attackTimer);
        cancelAnimationFrame(attackLoopId);
        playerSoul.style.display = 'none';
        
        dogs.forEach(dog => dog.element.remove());
        dogs = [];

        state = 'MAIN';
        currentMessage = "* It is your turn.";
        render();
    }

    // --- MENU INPUT HANDLING ---
    document.addEventListener('keydown', (e) => {
        if (state === 'ATTACK' || state === 'GAME_OVER') return; 

        const key = e.key.toLowerCase();
        const confirmKeys = ['z', 'enter'];
        const cancelKeys = ['x', 'shift'];

        if (state === 'MAIN') {
            if (key === 'arrowleft') mainIndex = Math.max(0, mainIndex - 1);
            if (key === 'arrowright') mainIndex = Math.min(3, mainIndex + 1);
            
            if (confirmKeys.includes(key)) {
                if (mainIndex === 0 || mainIndex === 3) {
                    currentMessage = "* Not implemented yet.";
                    state = 'MSG';
                } else if (mainIndex === 1) {
                    state = 'ACT';
                    subIndex = 0;
                } else if (mainIndex === 2) {
                    state = 'ITEM';
                    subIndex = 0;
                }
            }
        } 
        else if (state === 'ACT' || state === 'ITEM') {
            const options = state === 'ACT' ? actOptions : itemOptions;
            
            if (cancelKeys.includes(key)) {
                state = 'MAIN';
                currentMessage = "* Fight dialogue";
            }
            
            if (key === 'arrowleft' && subIndex % 2 !== 0) subIndex--;
            if (key === 'arrowright' && subIndex % 2 === 0 && subIndex + 1 < options.length) subIndex++;
            if (key === 'arrowup' && subIndex >= 2) subIndex -= 2;
            if (key === 'arrowdown' && subIndex + 2 < options.length) subIndex += 2;

            if (confirmKeys.includes(key)) {
                if (state === 'ACT') {
                    if (subIndex === 0) currentMessage = "* Hi";
                    if (subIndex === 1) currentMessage = "* You tried talking to it, but it<br>  didn't respond.";
                    
                    state = 'MSG';
                    dialogueContent.dataset.nextState = 'ATTACK'; 
                } else if (state === 'ITEM') {
                    currentMessage = `* You aren't hungry for ${options[subIndex]}.`;
                    state = 'MSG';
                    dialogueContent.dataset.nextState = 'MAIN';
                }
            }
        } 
        else if (state === 'MSG') {
            if (confirmKeys.includes(key)) {
                if (dialogueContent.dataset.nextState === 'ATTACK') {
                    startAttack();
                } else {
                    state = 'MAIN';
                    currentMessage = "* Fight dialogue";
                }
                dialogueContent.dataset.nextState = ''; 
            }
        }

        render();
    });

    render();
</script>

</body>
</html>
